global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    retries 3
    timeout connect 5s
    timeout client  300s
    timeout server  300s

# HAProxy stats page
listen stats
    bind *:8080
    mode http
    stats enable
    stats uri /
    stats refresh 10s
    stats admin if TRUE

# TiDB Load Balancer
# Distributes MySQL connections across all TiDB instances
listen tidb-cluster
    bind *:3306
    mode tcp
    balance roundrobin
    option tcplog
    
    # Health checks
    option mysql-check user root
    
    # TiDB servers
    server tidb0 tidb0:4000 check inter 2000 rise 2 fall 3
    server tidb1 tidb1:4000 check inter 2000 rise 2 fall 3
    server tidb2 tidb2:4000 check inter 2000 rise 2 fall 3
