# Incremental CDC Task Configuration
# Performs: binlog-based incremental sync only
# Assumes both Aurora and TiDB start in the same state
name: "aurora-to-tidb-cdc"
task-mode: "incremental"

# Ignore validation checks that fail with Aurora MySQL 8.4+
ignore-checking-items: ["all"]

target-database:
  host: "tidb0"
  port: 4000
  user: "root"
  password: ""

block-allow-list:
  ai-db-allowlist:
    do-dbs: ["ai_state_management"]

mysql-instances:
  - source-id: "aurora-prod"
    block-allow-list: "ai-db-allowlist"
    syncer-config-name: "global"

syncers:
  global:
    worker-count: 16
    batch: 100
    max-retry: 100
    multiple-rows: true

collation_compatible: "loose"
