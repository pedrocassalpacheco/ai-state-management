# Full Dump + Incremental Sync Task Configuration
# Performs: full dump (mysqldump) + continuous incremental binlog sync
# Will dump all existing data from Aurora, then continuously sync changes
name: "aurora-to-tidb-all"
task-mode: "all"

# Ignore validation checks that fail with Aurora MySQL 8.4+
ignore-checking-items: ["all"]

target-database:
  host: "tidb0"
  port: 4000
  user: "root"
  password: ""

block-allow-list:
  ai-db-allowlist:
    do-dbs: ["ai_state_management"]

mysql-instances:
  - source-id: "aurora-prod"
    block-allow-list: "ai-db-allowlist"
    syncer-config-name: "global"

syncers:
  global:
    worker-count: 16
    batch: 100
    max-retry: 100
    multiple-rows: true

collation_compatible: "loose"
